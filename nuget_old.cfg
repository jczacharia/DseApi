<?xml version="1.0" encoding="utf-8"?>
<configuration>

  <packageRestore>
    <add key="enabled" value="True" />
    <add key="automatic" value="True" />
  </packageRestore>

  <!-- No <clear />: these PNC feeds are ADDED to the machine-level sources, so this machine keeps
       using its default feed while Windows and the ADO pipeline use rpo.pncint.net. NU1507 (CPM +
       multiple sources) is suppressed in Directory.Build.props. -->
  <packageSources>
    <add key="ArtifactoryRemote" value="https://rpo.pncint.net/artifactory/api/nuget/ext-rpo-nuget-release-remote-cache" />
    <add key="Artifactory" value="https://rpo.pncint.net/artifactory/api/nuget/ext-rpo-nuget-release-remote" />
    <add key="ArtifactoryShared" value="https://rpo.pncint.net/artifactory/api/nuget/rpo-nuget-shared-release-local" />
  </packageSources>

</configuration>
